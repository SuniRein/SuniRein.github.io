ata-v-861ff622><span class="container" data-v-861ff622><span class="top" data-v-861ff622></span><span class="middle" data-v-861ff622></span><span class="bottom" data-v-861ff622></span></span></button></div></div></div></div><div class="divider" data-v-663f0377><div class="divider-line" data-v-663f0377></div></div></div><!----></header><!----><!----><!--[--><div id="VPContent" vp-content class="vp-content" data-v-5c08a3df data-v-5c31ca37><div class="vp-blog" vp-blog data-v-5c31ca37 data-v-90af5ead><!--[--><!--]--><div class="blog-container" data-v-90af5ead><!----><div class="vp-blog-post-list" data-v-90af5ead data-v-58c22583><!--[--><!--]--><!--[--><template><div class="vp-blog-post-item" data-allow-mismatch data-v-58c22583 data-v-b2775ebe><!----><div class="blog-post-item-content" data-v-b2775ebe><h3 data-v-b2775ebe><!----><!----><a class="vp-link no-icon link" href="/article/6tznb746/" data-v-b2775ebe data-v-de6ca8ad><!--[-->使用 Certbot 自动部署免费 SSL 证书<!--]--><!----></a></h3><div class="post-meta" data-v-b2775ebe><div class="category-list" data-v-b2775ebe><span class="icon vpi-folder" data-v-b2775ebe></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e9a3d2" data-v-b2775ebe data-v-de6ca8ad><!--[-->网站建设<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-b2775ebe><span class="icon vpi-tag" data-v-b2775ebe></span><!--[--><a class="vp-link no-icon link tag vp-tag-gjgy" href="/blog/tags/?tag=建站" data-v-b2775ebe data-v-de6ca8ad><!--[-->建站<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-pkrg" href="/blog/tags/?tag=SSL" data-v-b2775ebe data-v-de6ca8ad><!--[-->SSL<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-gjgy" href="/blog/tags/?tag=Certbot" data-v-b2775ebe data-v-de6ca8ad><!--[-->Certbot<!--]--><!----></a><!--]--></div><div class="create-time" data-v-b2775ebe><span class="icon vpi-clock" data-v-b2775ebe></span><span data-v-b2775ebe>2025-03-03</span></div></div><div class="vp-doc excerpt" data-v-b2775ebe><p>前几天个人网站的 SSL 证书过期了，导致很多部署在上面的服务突然就用不了了。
免费证书 90 天的有效期还是太短了，要是每年都要这样折腾几次就太麻烦了。
于是我最后花了点时间用 Certbot 来自动部署证书，从此一劳永逸地解决了这个问题。</p>
<p>在部署证书的过程中我也踩了一些坑，这里把我的经验分享出来，希望能帮到需要的人。</p>
</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-58c22583 data-v-b2775ebe><!----><div class="blog-post-item-content" data-v-b2775ebe><h3 data-v-b2775ebe><!----><!----><a class="vp-link no-icon link" href="/article/313wmwqo/" data-v-b2775ebe data-v-de6ca8ad><!--[-->B 树<!--]--><!----></a></h3><div class="post-meta" data-v-b2775ebe><div class="category-list" data-v-b2775ebe><span class="icon vpi-folder" data-v-b2775ebe></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e010e2" data-v-b2775ebe data-v-de6ca8ad><!--[-->数据结构与算法精讲<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-b2775ebe><span class="icon vpi-tag" data-v-b2775ebe></span><!--[--><a class="vp-link no-icon link tag vp-tag-1ivu" href="/blog/tags/?tag=数据结构" data-v-b2775ebe data-v-de6ca8ad><!--[-->数据结构<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-gjgy" href="/blog/tags/?tag=平衡树" data-v-b2775ebe data-v-de6ca8ad><!--[-->平衡树<!--]--><!----></a><!--]--></div><div class="create-time" data-v-b2775ebe><span class="icon vpi-clock" data-v-b2775ebe></span><span data-v-b2775ebe>2025-02-14</span></div></div><div class="vp-doc excerpt" data-v-b2775ebe><p>在本文中，我将深入解析 B 树这一广泛应用于数据库与文件系统的多路平衡搜索树。
与传统的二叉树不同，B 树通过多分支和高扇出的特性，显著减少磁盘 I/O 次数，从而高效管理海量数据。
本文将系统讲解 B 树的核心设计思想、平衡维护机制及其关键操作（查找、插入、删除），
探讨 B 树的适用场景，帮助读者理解其在大规模存储系统中的核心地位。</p>
</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-58c22583 data-v-b2775ebe><!----><div class="blog-post-item-content" data-v-b2775ebe><h3 data-v-b2775ebe><!----><!----><a class="vp-link no-icon link" href="/article/mdyrqsgl/" data-v-b2775ebe data-v-de6ca8ad><!--[-->Splay 树<!--]--><!----></a></h3><div class="post-meta" data-v-b2775ebe><div class="category-list" data-v-b2775ebe><span class="icon vpi-folder" data-v-b2775ebe></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e010e2" data-v-b2775ebe data-v-de6ca8ad><!--[-->数据结构与算法精讲<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-b2775ebe><span class="icon vpi-tag" data-v-b2775ebe></span><!--[--><a class="vp-link no-icon link tag vp-tag-1ivu" href="/blog/tags/?tag=数据结构" data-v-b2775ebe data-v-de6ca8ad><!--[-->数据结构<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-gjgy" href="/blog/tags/?tag=平衡树" data-v-b2775ebe data-v-de6ca8ad><!--[-->平衡树<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-ms5v" href="/blog/tags/?tag=自适应数据结构" data-v-b2775ebe data-v-de6ca8ad><!--[-->自适应数据结构<!--]--><!----></a><!--]--></div><div class="create-time" data-v-b2775ebe><span class="icon vpi-clock" data-v-b2775ebe></span><span data-v-b2775ebe>2025-02-01</span></div></div><div class="vp-doc excerpt" data-v-b2775ebe><p>在本文中，我将介绍 Splay 树，一种与 <RouteLink to="/%E6%95%B0%E6%8D%AE%E7%BB%93%E6%9E%84%E4%B8%8E%E7%AE%97%E6%B3%95%E7%B2%BE%E8%AE%B2/AVL%E6%A0%91.html">AVL 树</RouteLink>类似但有所不同的自适应二叉查找树。
与 AVL 树通过严格平衡因子维护树的高度不同，Splay 树通过伸展操作将最近访问的节点移动到根节点，从而自适应地优化频繁访问的数据。
这种灵活性使得 Splay 树在缓存、数据压缩等场景中表现优异。
本文将详细讲解 Splay 树的核心原理、操作实现及其与 AVL 树的异同，帮助读者深入理解这一自平衡树结构的独特优势。</p>
</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-58c22583 data-v-b2775ebe><!----><div class="blog-post-item-content" data-v-b2775ebe><h3 data-v-b2775ebe><!----><!----><a class="vp-link no-icon link" href="/article/dnnlipz6/" data-v-b2775ebe data-v-de6ca8ad><!--[-->AVL 树<!--]--><!----></a></h3><div class="post-meta" data-v-b2775ebe><div class="category-list" data-v-b2775ebe><span class="icon vpi-folder" data-v-b2775ebe></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e010e2" data-v-b2775ebe data-v-de6ca8ad><!--[-->数据结构与算法精讲<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-b2775ebe><span class="icon vpi-tag" data-v-b2775ebe></span><!--[--><a class="vp-link no-icon link tag vp-tag-1ivu" href="/blog/tags/?tag=数据结构" data-v-b2775ebe data-v-de6ca8ad><!--[-->数据结构<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-gjgy" href="/blog/tags/?tag=平衡树" data-v-b2775ebe data-v-de6ca8ad><!--[-->平衡树<!--]--><!----></a><!--]--></div><div class="create-time" data-v-b2775ebe><span class="icon vpi-clock" data-v-b2775ebe></span><span data-v-b2775ebe>2025-01-21</span></div></div><div class="vp-doc excerpt" data-v-b2775ebe><p>在本文中，我将详细介绍 AVL 树这一自平衡二叉查找树的基本概念、核心原理以及其操作过程，
帮助读者理解其如何保持高效的查询、插入和删除操作。
同时，我还将通过代码示例演示 AVL 树的实现，并分析其在实际应用中的优势与局限。
本文适合那些有一定数据结构基础，并希望深入了解自平衡树及其应用的读者。</p>
