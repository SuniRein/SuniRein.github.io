v-7f020678 data-v-b238679f><!--[--><!--]--><div class="blog-container" data-v-b238679f><!----><div class="vp-blog-post-list" data-v-b238679f data-v-2ff87a1d><!--[--><!--]--><!--[--><template><div class="vp-blog-post-item" data-allow-mismatch data-v-2ff87a1d data-v-5a871a7e><!----><div class="blog-post-item-content" data-v-5a871a7e><h3 data-v-5a871a7e><!----><!----><a class="vp-link no-icon link" href="/article/46i566mf/" data-v-5a871a7e data-v-78bbabef><!--[-->Just —— 类似 Make 的任务运行器<!--]--><!----></a></h3><div class="post-meta" data-v-5a871a7e><div class="category-list" data-v-5a871a7e><span class="icon vpi-folder" data-v-5a871a7e></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=cdaa07" data-v-5a871a7e data-v-78bbabef><!--[-->实用工具推荐<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-5a871a7e><span class="icon vpi-tag" data-v-5a871a7e></span><!--[--><a class="vp-link no-icon link tag vp-tag-u9hd" href="/blog/tags/?tag=实用工具" data-v-5a871a7e data-v-78bbabef><!--[-->实用工具<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-36xa" href="/blog/tags/?tag=终端" data-v-5a871a7e data-v-78bbabef><!--[-->终端<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-pozk" href="/blog/tags/?tag=Rust" data-v-5a871a7e data-v-78bbabef><!--[-->Rust<!--]--><!----></a><!--]--></div><div class="create-time" data-v-5a871a7e><span class="icon vpi-clock" data-v-5a871a7e></span><span data-v-5a871a7e>2025-07-09</span></div></div><!----></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-2ff87a1d data-v-5a871a7e><!----><div class="blog-post-item-content" data-v-5a871a7e><h3 data-v-5a871a7e><!----><!----><a class="vp-link no-icon link" href="/article/6tznb746/" data-v-5a871a7e data-v-78bbabef><!--[-->使用 Certbot 自动部署免费 SSL 证书<!--]--><!----></a></h3><div class="post-meta" data-v-5a871a7e><div class="category-list" data-v-5a871a7e><span class="icon vpi-folder" data-v-5a871a7e></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e9a3d2" data-v-5a871a7e data-v-78bbabef><!--[-->网站建设<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-5a871a7e><span class="icon vpi-tag" data-v-5a871a7e></span><!--[--><a class="vp-link no-icon link tag vp-tag-knai" href="/blog/tags/?tag=建站" data-v-5a871a7e data-v-78bbabef><!--[-->建站<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-eahu" href="/blog/tags/?tag=SSL" data-v-5a871a7e data-v-78bbabef><!--[-->SSL<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-knai" href="/blog/tags/?tag=Certbot" data-v-5a871a7e data-v-78bbabef><!--[-->Certbot<!--]--><!----></a><!--]--></div><div class="create-time" data-v-5a871a7e><span class="icon vpi-clock" data-v-5a871a7e></span><span data-v-5a871a7e>2025-03-03</span></div></div><div class="vp-doc excerpt" data-v-5a871a7e><p>前几天个人网站的 SSL 证书过期了，导致很多部署在上面的服务突然就用不了了。
免费证书 90 天的有效期还是太短了，要是每年都要这样折腾几次就太麻烦了。
于是我最后花了点时间用 Certbot 来自动部署证书，从此一劳永逸地解决了这个问题。</p>
<p>在部署证书的过程中我也踩了一些坑，这里把我的经验分享出来，希望能帮到需要的人。</p>
</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-2ff87a1d data-v-5a871a7e><!----><div class="blog-post-item-content" data-v-5a871a7e><h3 data-v-5a871a7e><!----><!----><a class="vp-link no-icon link" href="/article/313wmwqo/" data-v-5a871a7e data-v-78bbabef><!--[-->B 树<!--]--><!----></a></h3><div class="post-meta" data-v-5a871a7e><div class="category-list" data-v-5a871a7e><span class="icon vpi-folder" data-v-5a871a7e></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e010e2" data-v-5a871a7e data-v-78bbabef><!--[-->数据结构与算法精讲<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-5a871a7e><span class="icon vpi-tag" data-v-5a871a7e></span><!--[--><a class="vp-link no-icon link tag vp-tag-6znl" href="/blog/tags/?tag=数据结构" data-v-5a871a7e data-v-78bbabef><!--[-->数据结构<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-knai" href="/blog/tags/?tag=平衡树" data-v-5a871a7e data-v-78bbabef><!--[-->平衡树<!--]--><!----></a><!--]--></div><div class="create-time" data-v-5a871a7e><span class="icon vpi-clock" data-v-5a871a7e></span><span data-v-5a871a7e>2025-02-14</span></div></div><div class="vp-doc excerpt" data-v-5a871a7e><p>在本文中，我将深入解析 B 树这一广泛应用于数据库与文件系统的多路平衡搜索树。
与传统的二叉树不同，B 树通过多分支和高扇出的特性，显著减少磁盘 I/O 次数，从而高效管理海量数据。
本文将系统讲解 B 树的核心设计思想、平衡维护机制及其关键操作（查找、插入、删除），
探讨 B 树的适用场景，帮助读者理解其在大规模存储系统中的核心地位。</p>
</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-2ff87a1d data-v-5a871a7e><!----><div class="blog-post-item-content" data-v-5a871a7e><h3 data-v-5a871a7e><!----><!----><a class="vp-link no-icon link" href="/article/mdyrqsgl/" data-v-5a871a7e data-v-78bbabef><!--[-->Splay 树<!--]--><!----></a></h3><div class="post-meta" data-v-5a871a7e><div class="category-list" data-v-5a871a7e><span class="icon vpi-folder" data-v-5a871a7e></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e010e2" data-v-5a871a7e data-v-78bbabef><!--[-->数据结构与算法精讲<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-5a871a7e><span class="icon vpi-tag" data-v-5a871a7e></span><!--[--><a class="vp-link no-icon link tag vp-tag-6znl" href="/blog/tags/?tag=数据结构" data-v-5a871a7e data-v-78bbabef><!--[-->数据结构<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-knai" href="/blog/tags/?tag=平衡树" data-v-5a871a7e data-v-78bbabef><!--[-->平衡树<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-iu6v" href="/blog/tags/?tag=自适应数据结构" data-v-5a871a7e data-v-78bbabef><!--[-->自适应数据结构<!--]--><!----></a><!--]--></div><div class="create-time" data-v-5a871a7e><span class="icon vpi-clock" data-v-5a871a7e></span><span data-v-5a871a7e>2025-02-01</span></div></div><div class="vp-doc excerpt" data-v-5a871a7e><p>在本文中，我将介绍 Splay 树，一种与 <RouteLink to="/%E6%95%B0%E6%8D%AE%E7%BB%93%E6%9E%84%E4%B8%8E%E7%AE%97%E6%B3%95%E7%B2%BE%E8%AE%B2/AVL%E6%A0%91.html">AVL 树</RouteLink>类似但有所不同的自适应二叉查找树。
与 AVL 树通过严格平衡因子维护树的高度不同，Splay 树通过伸展操作将最近访问的节点移动到根节点，从而自适应地优化频繁访问的数据。
这种灵活性使得 Splay 树在缓存、数据压缩等场景中表现优异。
本文将详细讲解 Splay 树的核心原理、操作实现及其与 AVL 树的异同，帮助读者深入理解这一自平衡树结构的独特优势。</p>
</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-2ff87a1d data-v-5a871a7e><!----><div class="blog-post-item-content" data-v-5a871a7e><h3 data-v-5a871a7e><!----><!----><a class="vp-link no-icon link" href="/article/dnnlipz6/" data-v-5a871a7e data-v-78bbabef><!--[-->AVL 树<!--]--><!----></a></h3><div class="post-meta" data-v-5a871a7e><div class="category-list" data-v-5a871a7e><span class="icon vpi-folder" data-v-5a871a7e></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e010e2" data-v-5a871a7e data-v-78bbabef><!--[-->数据结构与算法精讲<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-5a871a7e><span class="icon vpi-tag" data-v-5a871a7e></span><!--[--><a class="vp-link no-icon link tag vp-tag-6znl" href="/blog/tags/?tag=数据结构" data-v-5a871a7e data-v-78bbabef><!--[-->数据结构<!--]--><!----></a><a class="vp-link no-icon link tag vp-tag-knai" href="/blog/tags/?tag=平衡树" data-v-5a871a7e data-v-78bbabef><!--[-->平衡树<!--]--><!----></a><!--]--></div><div class="create-time" data-v-5a871a7e><span class="icon vpi-clock" data-v-5a871a7e></span><span data-v-5a871a7e>2025-01-21</span></div></div><div class="vp-doc excerpt" data-v-5a871a7e><p>在本文中，我将详细介绍 AVL 树这一自平衡二叉查找树的基本概念、核心原理以及其操作过程，
帮助读者理解其如何保持高效的查询、插入和删除操作。
同时，我还将通过代码示例演示 AVL 树的实现，并分析其在实际应用中的优势与局限。
本文适合那些有一定数据结构基础，并希望深入了解自平衡树及其应用的读者。</p>
